<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siz uchun maxsus ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1b0022 0%, #000 100%);
            overflow: hidden;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }

        .heart {
            font-size: 80px;
            color: #ff4d6d;
            text-shadow: 0 0 30px #ff4d6d;
            animation: pulse 1.5s ease-in-out infinite;
            cursor: pointer;
            pointer-events: auto;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2) rotate(5deg); }
            100% { transform: scale(1); }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            margin-top: 20px;
            background: linear-gradient(to right, #ff758f, #ff4d6d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255, 77, 109, 0.5));
        }

        .typewriter {
            font-size: 1.2rem;
            margin-top: 10px;
            min-height: 1.5em;
            letter-spacing: 2px;
            color: #ffb3c1;
        }

        .btn {
            margin-top: 30px;
            padding: 12px 30px;
            border: 1px solid #ff4d6d;
            background: transparent;
            color: #ff4d6d;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s;
            pointer-events: auto;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 3px;
        }

        .btn:hover {
            background: #ff4d6d;
            color: #fff;
            box-shadow: 0 0 30px #ff4d6d;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="content">
        <div class="heart" onclick="createBurst()">❤️</div>
        <h1 id="title">Mening Dunyoyim</h1>
        <div class="typewriter" id="text"></div>
        <button class="btn" onclick="changeTheme()">Sehrni yoqish</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let mouse = { x: null, y: null };
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
            for(let i = 0; i < 3; i++) {
                particles.push(new Particle(mouse.x, mouse.y));
            }
        });

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 5 + 1;
                this.speedX = Math.random() * 3 - 1.5;
                this.speedY = Math.random() * 3 - 1.5;
                this.color = `hsl(${Math.random() * 60 + 330}, 100%, 70%)`;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.size > 0.1) this.size -= 0.05;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].size <= 0.2) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animate);
        }
        animate();

        const message = "Sizni uchratganim - hayotimdagi eng go'zal tasodif. Har bir soniya siz bilan yanada yorqinroq...";
        let index = 0;
        function typeWriter() {
            if (index < message.length) {
                document.getElementById("text").innerHTML += message.charAt(index);
                index++;
                setTimeout(typeWriter, 70);
            }
        }
        setTimeout(typeWriter, 1500);

        function createBurst() {
            for(let i = 0; i < 50; i++) {
                particles.push(new Particle(window.innerWidth/2, window.innerHeight/2 - 50));
            }
        }

        function changeTheme() {
            document.body.style.background = "radial-gradient(circle at center, #450920 0%, #000 100%)";
            document.getElementById("title").innerText = "Faqat Siz Uchun ✨";
            createBurst();
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
